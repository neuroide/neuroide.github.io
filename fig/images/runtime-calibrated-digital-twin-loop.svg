<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">Runtime-Calibrated Digital Twin Loop</title>
  <desc id="desc">Circular loop showing simulator, deployment, runtime traces, mismatch analysis, and calibration.</desc>
  <defs>
    <style>
      .bg { fill: #fbf7f3; }
      .ring { fill: none; stroke: #996d4e; stroke-width: 18; opacity: 0.15; }
      .panel { fill: #ffffff; stroke: #6d4e36; stroke-width: 2.5; rx: 18; ry: 18; }
      .accent { fill: #f0e2d7; stroke: #8b6140; stroke-width: 2.2; rx: 16; ry: 16; }
      .title { font: 700 34px Georgia, "Times New Roman", serif; fill: #2f231b; }
      .label { font: 600 21px Georgia, "Times New Roman", serif; fill: #533a29; }
      .body { font: 15px Georgia, "Times New Roman", serif; fill: #6a4e3b; }
      .arrow { stroke: #6d4e36; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6d4e36"/>
    </marker>
  </defs>
  <rect class="bg" width="1400" height="920"/>
  <text class="title" x="700" y="56" text-anchor="middle">Runtime-Calibrated Digital Twins for Sim-to-Real Robotics</text>
  <text class="body" x="700" y="86" text-anchor="middle">Simulation becomes credible when it stays answerable to runtime traces.</text>

  <circle class="ring" cx="700" cy="500" r="280"/>

  <rect class="accent" x="570" y="145" width="260" height="90"/>
  <text class="label" x="700" y="185" text-anchor="middle">Simulator</text>
  <text class="body" x="700" y="212" text-anchor="middle">physics, delays, noise, traffic</text>

  <rect class="accent" x="980" y="365" width="260" height="90"/>
  <text class="label" x="1110" y="405" text-anchor="middle">Robot Deployment</text>
  <text class="body" x="1110" y="432" text-anchor="middle">hardware, environment, operators</text>

  <rect class="accent" x="570" y="690" width="260" height="90"/>
  <text class="label" x="700" y="730" text-anchor="middle">Runtime Traces</text>
  <text class="body" x="700" y="757" text-anchor="middle">cycle time, latency, interventions</text>

  <rect class="accent" x="160" y="365" width="260" height="90"/>
  <text class="label" x="290" y="405" text-anchor="middle">Mismatch Analysis</text>
  <text class="body" x="290" y="432" text-anchor="middle">distribution shift and trace error</text>

  <rect class="panel" x="520" y="390" width="360" height="180" rx="24" ry="24"/>
  <text class="label" x="700" y="442" text-anchor="middle">Calibration Layer</text>
  <text class="body" x="700" y="474" text-anchor="middle">update simulator parameters to reduce</text>
  <text class="body" x="700" y="499" text-anchor="middle">mismatch in dynamics, timing, and events</text>
  <text class="body" x="700" y="532" text-anchor="middle">real traces reshape future simulated evidence</text>

  <path class="arrow" d="M830 190 C955 220, 1040 290, 1080 365"/>
  <path class="arrow" d="M1110 455 C1085 575, 965 670, 830 725"/>
  <path class="arrow" d="M570 725 C435 670, 315 575, 290 455"/>
  <path class="arrow" d="M290 365 C330 290, 415 220, 570 190"/>

  <path class="arrow" d="M700 235 L700 390"/>
  <path class="arrow" d="M1000 455 C945 470, 910 475, 880 480"/>
  <path class="arrow" d="M700 690 L700 570"/>
  <path class="arrow" d="M420 455 C475 470, 510 475, 520 480"/>
</svg>
