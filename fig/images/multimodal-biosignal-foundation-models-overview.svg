<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">Multimodal Biosignal Foundation Models</title>
  <desc id="desc">Overview diagram showing inputs, pretraining architecture, objectives, and downstream uses for multimodal biosignal foundation models.</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .panel { fill: #ffffff; stroke: #22324a; stroke-width: 2; rx: 20; ry: 20; }
      .soft { fill: #eaf0f7; stroke: #3d5878; stroke-width: 1.8; rx: 14; ry: 14; }
      .accent { fill: #dcebf6; stroke: #2f5d87; stroke-width: 2; rx: 14; ry: 14; }
      .task { fill: #eef4ea; stroke: #4e6a45; stroke-width: 1.8; rx: 14; ry: 14; }
      .warn { fill: #f8efe1; stroke: #8a6940; stroke-width: 1.8; rx: 14; ry: 14; }
      .title { font: 700 34px Georgia, "Times New Roman", serif; fill: #182433; }
      .subtitle { font: 600 18px Georgia, "Times New Roman", serif; fill: #24364d; }
      .body { font: 16px Georgia, "Times New Roman", serif; fill: #1f2f43; }
      .small { font: 14px Georgia, "Times New Roman", serif; fill: #314862; }
      .arrow { stroke: #24364d; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .arrowSoft { stroke: #59738f; stroke-width: 2; fill: none; marker-end: url(#arrowSoft); }
      .dash { stroke-dasharray: 8 7; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#24364d"/>
    </marker>
    <marker id="arrowSoft" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#59738f"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="920"/>

  <text class="title" x="700" y="52" text-anchor="middle">Multimodal Biosignal Foundation Models</text>
  <text class="subtitle" x="700" y="82" text-anchor="middle">From heterogeneous sensor streams to reusable physiological representations</text>

  <rect class="panel" x="40" y="120" width="250" height="700"/>
  <text class="subtitle" x="165" y="155" text-anchor="middle">Input Modalities</text>

  <rect class="soft" x="65" y="185" width="200" height="54"/>
  <text class="body" x="165" y="217" text-anchor="middle">EEG / EOG / EMG</text>

  <rect class="soft" x="65" y="257" width="200" height="54"/>
  <text class="body" x="165" y="289" text-anchor="middle">ECG / PPG / ABP</text>

  <rect class="soft" x="65" y="329" width="200" height="54"/>
  <text class="body" x="165" y="361" text-anchor="middle">Respiration / Airflow / SpO2</text>

  <rect class="soft" x="65" y="401" width="200" height="54"/>
  <text class="body" x="165" y="433" text-anchor="middle">PCG and Other Acoustics</text>

  <rect class="soft" x="65" y="473" width="200" height="54"/>
  <text class="body" x="165" y="505" text-anchor="middle">Clinical Text / Reports</text>

  <rect class="warn" x="65" y="565" width="200" height="120"/>
  <text class="body" x="165" y="598" text-anchor="middle">Real-World Constraints</text>
  <text class="small" x="165" y="626" text-anchor="middle">sampling-rate mismatch</text>
  <text class="small" x="165" y="648" text-anchor="middle">sensor dropout</text>
  <text class="small" x="165" y="670" text-anchor="middle">cohort and device shift</text>

  <rect class="panel" x="340" y="120" width="420" height="700"/>
  <text class="subtitle" x="550" y="155" text-anchor="middle">Model Stack</text>

  <rect class="accent" x="375" y="190" width="350" height="95"/>
  <text class="body" x="550" y="222" text-anchor="middle">Modality-Specific Tokenizers</text>
  <text class="small" x="550" y="246" text-anchor="middle">patchification, filtering, resampling, channel maps</text>
  <text class="small" x="550" y="268" text-anchor="middle">sensor-aware front ends before fusion</text>

  <rect class="accent" x="375" y="330" width="350" height="120"/>
  <text class="body" x="550" y="364" text-anchor="middle">Shared Latent Backbone</text>
  <text class="small" x="550" y="390" text-anchor="middle">transformer or hybrid temporal encoder</text>
  <text class="small" x="550" y="414" text-anchor="middle">channel-agnostic fusion with missingness awareness</text>

  <rect class="accent" x="375" y="500" width="350" height="105"/>
  <text class="body" x="550" y="534" text-anchor="middle">Pretraining Objectives</text>
  <text class="small" x="550" y="560" text-anchor="middle">masked modeling, cross-modal alignment,</text>
  <text class="small" x="550" y="582" text-anchor="middle">cross-modal reconstruction, modality dropout</text>

  <rect class="accent" x="375" y="650" width="350" height="120"/>
  <text class="body" x="550" y="684" text-anchor="middle">Reusable Representation</text>
  <text class="small" x="550" y="710" text-anchor="middle">latent state embeddings that transfer across</text>
  <text class="small" x="550" y="734" text-anchor="middle">tasks, cohorts, devices, and sensor subsets</text>

  <rect class="panel" x="810" y="120" width="250" height="700"/>
  <text class="subtitle" x="935" y="155" text-anchor="middle">Scientific Objectives</text>

  <rect class="soft" x="835" y="190" width="200" height="72"/>
  <text class="body" x="935" y="221" text-anchor="middle">Shared Physiology</text>
  <text class="small" x="935" y="245" text-anchor="middle">learn latent state, not sensor idiosyncrasy</text>

  <rect class="soft" x="835" y="290" width="200" height="72"/>
  <text class="body" x="935" y="321" text-anchor="middle">Robust Missingness</text>
  <text class="small" x="935" y="345" text-anchor="middle">operate with incomplete sensor sets</text>

  <rect class="soft" x="835" y="390" width="200" height="72"/>
  <text class="body" x="935" y="421" text-anchor="middle">Generalization</text>
  <text class="small" x="935" y="445" text-anchor="middle">transfer across device and cohort shifts</text>

  <rect class="soft" x="835" y="490" width="200" height="72"/>
  <text class="body" x="935" y="521" text-anchor="middle">Interpretability Pressure</text>
  <text class="small" x="935" y="545" text-anchor="middle">retain physiologically meaningful structure</text>

  <rect class="soft" x="835" y="590" width="200" height="72"/>
  <text class="body" x="935" y="621" text-anchor="middle">Scalable Adaptation</text>
  <text class="small" x="935" y="645" text-anchor="middle">support linear probe, finetuning, QA, forecasting</text>

  <rect class="panel" x="1110" y="120" width="250" height="700"/>
  <text class="subtitle" x="1235" y="155" text-anchor="middle">Downstream Uses</text>

  <rect class="task" x="1135" y="185" width="200" height="56"/>
  <text class="body" x="1235" y="219" text-anchor="middle">diagnosis and staging</text>

  <rect class="task" x="1135" y="259" width="200" height="56"/>
  <text class="body" x="1235" y="293" text-anchor="middle">risk prediction</text>

  <rect class="task" x="1135" y="333" width="200" height="56"/>
  <text class="body" x="1235" y="367" text-anchor="middle">vital-sign estimation</text>

  <rect class="task" x="1135" y="407" width="200" height="56"/>
  <text class="body" x="1235" y="441" text-anchor="middle">alarm filtering</text>

  <rect class="task" x="1135" y="481" width="200" height="56"/>
  <text class="body" x="1235" y="515" text-anchor="middle">modality translation</text>

  <rect class="task" x="1135" y="555" width="200" height="56"/>
  <text class="body" x="1235" y="589" text-anchor="middle">question answering</text>

  <rect class="task" x="1135" y="629" width="200" height="56"/>
  <text class="body" x="1235" y="663" text-anchor="middle">longitudinal monitoring</text>

  <path class="arrow" d="M265 212 C320 212, 330 212, 375 212"/>
  <path class="arrow" d="M265 284 C320 284, 330 284, 375 240"/>
  <path class="arrow" d="M265 356 C320 356, 330 356, 375 355"/>
  <path class="arrow" d="M265 428 C320 428, 330 428, 375 390"/>
  <path class="arrow" d="M265 500 C320 500, 330 500, 375 548"/>

  <path class="arrow" d="M550 285 L550 330"/>
  <path class="arrow" d="M550 450 L550 500"/>
  <path class="arrow" d="M550 605 L550 650"/>

  <path class="arrow" d="M725 240 C790 240, 790 220, 835 220"/>
  <path class="arrow" d="M725 390 C790 390, 790 320, 835 320"/>
  <path class="arrow" d="M725 550 C790 550, 790 420, 835 420"/>
  <path class="arrow" d="M725 710 C790 710, 790 620, 835 620"/>

  <path class="arrow" d="M1035 220 C1085 220, 1090 213, 1135 213"/>
  <path class="arrow" d="M1035 320 C1085 320, 1090 287, 1135 287"/>
  <path class="arrow" d="M1035 420 C1085 420, 1090 361, 1135 361"/>
  <path class="arrow" d="M1035 520 C1085 520, 1090 435, 1135 435"/>
  <path class="arrow" d="M1035 620 C1085 620, 1090 509, 1135 509"/>
  <path class="arrow" d="M1035 640 C1085 640, 1090 583, 1135 583"/>
  <path class="arrow" d="M1035 660 C1085 660, 1090 657, 1135 657"/>

  <path class="arrowSoft dash" d="M265 625 C420 625, 420 820, 935 820 C1180 820, 1235 750, 1235 685"/>
  <text class="small" x="690" y="845" text-anchor="middle">deployment reality: modality absence and device variation must be handled by design, not patched after pretraining</text>
</svg>
