<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">Error Propagation in an Embodied Robot Stack</title>
  <desc id="desc">Stacked blocks showing perception, estimation, planning, control, execution and feedback with error propagation arrows.</desc>
  <defs>
    <style>
      .bg { fill: #f8f5fa; }
      .block1 { fill: #ebe2f2; stroke: #5f4978; stroke-width: 2.2; rx: 18; ry: 18; }
      .block2 { fill: #e2ecf6; stroke: #49657f; stroke-width: 2.2; rx: 18; ry: 18; }
      .block3 { fill: #e8f1e4; stroke: #57724f; stroke-width: 2.2; rx: 18; ry: 18; }
      .block4 { fill: #f2e8dd; stroke: #86674a; stroke-width: 2.2; rx: 18; ry: 18; }
      .title { font: 700 34px Georgia, "Times New Roman", serif; fill: #2d2140; }
      .label { font: 600 21px Georgia, "Times New Roman", serif; fill: #36284d; }
      .body { font: 15px Georgia, "Times New Roman", serif; fill: #493a62; }
      .arrow { stroke: #594874; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #8a7aa0; stroke-width: 2; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrowSoft); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#594874"/>
    </marker>
    <marker id="arrowSoft" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a7aa0"/>
    </marker>
  </defs>
  <rect class="bg" width="1400" height="920"/>
  <text class="title" x="700" y="56" text-anchor="middle">Error Propagation and Distribution Shift in Embodied Robot Systems</text>
  <text class="body" x="700" y="86" text-anchor="middle">Local uncertainty becomes system risk when the robot acts on imperfect internal state.</text>

  <rect class="block1" x="150" y="190" width="210" height="95"/>
  <text class="label" x="255" y="228" text-anchor="middle">Perception</text>
  <text class="body" x="255" y="255" text-anchor="middle">detection, segmentation,</text>
  <text class="body" x="255" y="277" text-anchor="middle">human tracking</text>

  <rect class="block2" x="450" y="190" width="210" height="95"/>
  <text class="label" x="555" y="228" text-anchor="middle">Estimation</text>
  <text class="body" x="555" y="255" text-anchor="middle">belief state, filtering,</text>
  <text class="body" x="555" y="277" text-anchor="middle">uncertainty update</text>

  <rect class="block3" x="750" y="190" width="210" height="95"/>
  <text class="label" x="855" y="228" text-anchor="middle">Planning</text>
  <text class="body" x="855" y="255" text-anchor="middle">goal sequencing, path,</text>
  <text class="body" x="855" y="277" text-anchor="middle">risk tradeoff</text>

  <rect class="block4" x="1050" y="190" width="210" height="95"/>
  <text class="label" x="1155" y="228" text-anchor="middle">Control</text>
  <text class="body" x="1155" y="255" text-anchor="middle">tracking, stopping,</text>
  <text class="body" x="1155" y="277" text-anchor="middle">timing budget</text>

  <rect class="block2" x="560" y="500" width="280" height="130"/>
  <text class="label" x="700" y="548" text-anchor="middle">Embodied Interaction</text>
  <text class="body" x="700" y="578" text-anchor="middle">actions change the world and therefore</text>
  <text class="body" x="700" y="602" text-anchor="middle">change the next observation distribution</text>

  <path class="arrow" d="M360 238 L450 238"/>
  <path class="arrow" d="M660 238 L750 238"/>
  <path class="arrow" d="M960 238 L1050 238"/>
  <path class="arrow" d="M1155 285 C1155 395, 980 480, 840 535"/>
  <path class="arrow" d="M700 500 C650 430, 580 360, 555 285"/>
  <path class="arrow" d="M560 565 C410 565, 300 470, 255 285"/>

  <path class="soft" d="M255 190 C255 130, 555 130, 555 190"/>
  <text class="body" x="404" y="125" text-anchor="middle">distribution shift enters here</text>

  <path class="soft" d="M855 190 C855 130, 1155 130, 1155 190"/>
  <text class="body" x="1004" y="125" text-anchor="middle">planning and control amplify or attenuate upstream error</text>

  <text class="body" x="700" y="780" text-anchor="middle">A stack is trustworthy when downstream sensitivity is engineered, measured, and bounded rather than assumed away.</text>
</svg>
