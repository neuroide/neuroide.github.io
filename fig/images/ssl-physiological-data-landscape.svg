  </defs>
  <text x="88" y="108" fill="#1C3550" font-family="Georgia, serif" font-size="46" font-weight="700">
    Self-Supervised Representation Learning for Physiological Data
  </text>
  <text x="88" y="148" fill="#5F6876" font-family="Arial, sans-serif" font-size="24">
    Core objective families, physiological structure, and downstream scientific value.
  </text>

  <rect x="110" y="220" width="300" height="150" rx="22" fill="#DDEAF8" stroke="#1C3550" stroke-width="3"/>
  <text x="142" y="274" fill="#1C3550" font-family="Arial, sans-serif" font-size="30" font-weight="700">Contrastive</text>
  <text x="142" y="314" fill="#344054" font-family="Arial, sans-serif" font-size="22">InfoNCE, patient/time/lead positives</text>

  <rect x="468" y="220" width="300" height="150" rx="22" fill="#E6F6E8" stroke="#2B5D42" stroke-width="3"/>
  <text x="500" y="274" fill="#2B5D42" font-family="Arial, sans-serif" font-size="30" font-weight="700">Predictive</text>
  <text x="500" y="314" fill="#314339" font-family="Arial, sans-serif" font-size="22">future latent state, CPC</text>

  <rect x="826" y="220" width="300" height="150" rx="22" fill="#F6E5D9" stroke="#7A4B1E" stroke-width="3"/>
  <text x="858" y="274" fill="#7A4B1E" font-family="Arial, sans-serif" font-size="30" font-weight="700">Masked Modeling</text>
  <text x="858" y="314" fill="#5A3D24" font-family="Arial, sans-serif" font-size="22">reconstruction, lead/electrode geometry</text>

  <rect x="1184" y="220" width="300" height="150" rx="22" fill="#F0E5F8" stroke="#5C2F73" stroke-width="3"/>
  <text x="1216" y="274" fill="#5C2F73" font-family="Arial, sans-serif" font-size="30" font-weight="700">Alignment</text>
  <text x="1216" y="314" fill="#50395B" font-family="Arial, sans-serif" font-size="22">BYOL-style, multimodal agreement</text>

  <rect x="310" y="520" width="980" height="220" rx="26" fill="#EFE9DE" stroke="#6A5A46" stroke-width="3"/>
